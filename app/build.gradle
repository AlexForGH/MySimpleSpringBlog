plugins {
    id 'application'
    id 'war'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    //add needed dependencies for MySimpleSpringBlog
    implementation "org.springframework:spring-webmvc:6.2.1"
    implementation "org.springframework.data:spring-data-jdbc:3.4.1"
    implementation "jakarta.servlet:jakarta.servlet-api:4.0.2"
    implementation "org.thymeleaf:thymeleaf:3.1.2.RELEASE"
    implementation "org.thymeleaf:thymeleaf-spring6:3.1.2.RELEASE"
    implementation "com.h2database:h2:2.2.224"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'org.example.App'
}

tasks.named('test') {
    useJUnitPlatform()
}
